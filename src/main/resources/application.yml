server:
  port: 8075

spring:
  application:
    name: API_Gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:8080"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: trains-service
          uri: lb://trains-service
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                rate-limiter: "#{@redisRateLimiter}"
            - name: CircuitBreaker
              args:
                name: trainsCircuitBreaker
                fallbackUri: forward:/fallback
        - id: training-service
          uri: lb://training-service
          predicates:
            - Path=/api/cabinets/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                rate-limiter: "#{@redisRateLimiter}"
            - name: CircuitBreaker
              args:
                name: trainingCircuitBreaker
                fallbackUri: forward:/fallback
        - id: training-nutrition
          uri: lb://training-nutrition
          predicates:
            - Path=/api/nutrition/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                rate-limiter: "#{@redisRateLimiter}"
            - name: CircuitBreaker
              args:
                name: nutritionCircuitBreaker
                fallbackUri: forward:/fallback
        - id: training-notification
          uri: lb://training-notification
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                rate-limiter: "#{@redisRateLimiter}"
            - name: CircuitBreaker
              args:
                name: notificationCircuitBreaker
                fallbackUri: forward:/fallback
        - id: recommendation-service
          uri: lb://recommendation-service
          predicates:
            - Path=/api/recommendations/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                rate-limiter: "#{@redisRateLimiter}"
            - name: CircuitBreaker
              args:
                name: recommendationCircuitBreaker
                fallbackUri: forward:/fallback
        - id: saga-orchestrator
          uri: lb://saga-orchestrator
          predicates:
            - Path=/api/saga/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                rate-limiter: "#{@redisRateLimiter}"
            - name: CircuitBreaker
              args:
                name: sagaCircuitBreaker
                fallbackUri: forward:/fallback

gateway:
  rate-limiter:
    replenish-rate: ${RATE_LIMITER_REPLENISH_RATE:10}
    burst-capacity: ${RATE_LIMITER_BURST_CAPACITY:20}
  jwt:
    user-id-header: ${JWT_USER_ID_HEADER:X-User-Id}
  fallback:
    error-message: ${FALLBACK_ERROR_MESSAGE:Service temporarily unavailable}
    error-key: ${FALLBACK_ERROR_KEY:error}
    correlation-id-key: ${FALLBACK_CORRELATION_ID_KEY:correlationId}

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics, gateway
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99
  tracing:
    sampling:
      probability: 1.0

jwt:
  secret: ${JWT_SECRET:your-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
  expiration: ${JWT_EXPIRATION:86400000}

eureka:
  client:
    register-with-eureka: false
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://eureka-server:8761/eureka/}
  instance:
    prefer-ip-address: true

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
