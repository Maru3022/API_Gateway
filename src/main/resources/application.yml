server:
  port: 8075

spring:
  application:
    name: API_Gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: trains-service
          uri: lb://trains-service
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                rate-limiter: "#{@inMemoryRateLimiter}"
            - name: CircuitBreaker
              args:
                name: trainsCircuitBreaker
                fallbackUri: forward:/fallback
        - id: training-service
          uri: lb://training-service
          predicates:
            - Path=/api/cabinets/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                rate-limiter: "#{@inMemoryRateLimiter}"
            - name: CircuitBreaker
              args:
                name: trainingCircuitBreaker
                fallbackUri: forward:/fallback
        - id: training-nutrition
          uri: lb://training-nutrition
          predicates:
            - Path=/api/nutrition/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                rate-limiter: "#{@inMemoryRateLimiter}"
            - name: CircuitBreaker
              args:
                name: nutritionCircuitBreaker
                fallbackUri: forward:/fallback
        - id: training-notification
          uri: lb://training-notification
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                rate-limiter: "#{@inMemoryRateLimiter}"
            - name: CircuitBreaker
              args:
                name: notificationCircuitBreaker
                fallbackUri: forward:/fallback
        - id: recommendation-service
          uri: lb://recommendation-service
          predicates:
            - Path=/api/recommendations/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                rate-limiter: "#{@inMemoryRateLimiter}"
            - name: CircuitBreaker
              args:
                name: recommendationCircuitBreaker
                fallbackUri: forward:/fallback
        - id: saga-orchestrator
          uri: lb://saga-orchestrator
          predicates:
            - Path=/api/saga/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                rate-limiter: "#{@inMemoryRateLimiter}"
            - name: CircuitBreaker
              args:
                name: sagaCircuitBreaker
                fallbackUri: forward:/fallback

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

eureka:
  client:
    register-with-eureka: false
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://eureka-server:8761/eureka/}
  instance:
    prefer-ip-address: true
