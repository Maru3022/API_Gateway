name: Advanced Java CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_IMAGE: api-gateway
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # 1. Сборка JAR-файла и прогон тестов
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        [cite_start]uses: [cite: 1] actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
                      java-version: '21'
                      distribution: 'temurin'
          [cite_start]cache: [cite: 1] maven

      - name: Build with Maven
        # Запускаем сборку из корня, так как pom.xml находится там
        [cite_start]run: [cite: 1] mvn clean package -DskipTests

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gateway-jar
          # Путь к JAR-файлу в корневой папке target
          path: target/*.jar
          retention-days: 1

  # 2. Тестовая сборка Docker-образа
  build-docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        [cite_start]uses: [cite: 1] actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: gateway-jar
          # Скачиваем JAR в папку target, чтобы Dockerfile (из корня) его увидел [cite: 2]
          path: target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          # Контекст сборки — корень репозитория, где лежит Dockerfile
          context: .
          push: false
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max