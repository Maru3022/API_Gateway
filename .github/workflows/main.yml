name: Advanced Java CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_IMAGE: api-gateway
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # 1. Сборка JAR файла и прогон тестов
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        # Указываем рабочую директорию, где лежит pom.xml
        working-directory: ./API_Gateway
        run: mvn clean package -DskipTests

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gateway-jar
          # Путь к собранному JAR относительно корня репозитория
          path: API_Gateway/target/*.jar
          retention-days: 1

  # 2. Тестовая сборка Docker-образа
  build-docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: gateway-jar
          # Скачиваем артефакт в папку API_Gateway/target, чтобы Dockerfile его увидел
          path: API_Gateway/target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          # Указываем контекст: папку, где лежит Dockerfile
          context: ./API_Gateway
          push: false
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max