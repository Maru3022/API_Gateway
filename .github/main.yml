name: Advanced Java CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/api-gateway
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - [cite_start]uses: actions/checkout@v4 [cite: 1]

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
                      java-version: '21'
                      distribution: 'temurin'
          [cite_start]cache: maven [cite: 1]

      - name: Build with Maven & Run Tests
        [cite_start]run: mvn clean package [cite: 1]

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gateway-jar
          path: target/*.jar

  deploy-image:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: gateway-jar
          path: target/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}